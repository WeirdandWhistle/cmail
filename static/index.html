<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <style>
            .form-group {
                display: flex;
                align-items: center;
                margin-bottom: 10px;
            }

             .form-group span {
                width: 150px; 
                font-weight: bold;
            }
</style>
    </head>

    <body>
        <h2>Sign in</h2>

        <div class="form-group">
          <span>Handle/username:</span>
          <input type="text" placeholder="@user1" id="signin-username">
        </div>

        <div class="form-group">
          <span>Password:</span>
          <input type="password" placeholder="password" id="signin-password">
        </div>
        <button onclick="signin()">Sign In</button>
        <hr>
        <h2>Sign up</h2>

        <div class="form-group">
          <span>Handle/username:</span>
          <input type="text" placeholder="@user1" id="signup-username">
        </div>

        <div class="form-group">
          <span>Password:</span>
          <input type="password" placeholder="password" id="signup-password">
        </div>
        <button onclick="signup()">Sign Up</button>
    </body>

    
  <script src="app.js"></script>
  <script src="sodium.js" async></script>
</html>
